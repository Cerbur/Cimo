spring:
  application:
    name: Cimo

cimo:
  provider: anthropic
  work-dir: ${user.dir}/Documents/Code/Cimo/.tmp
  anthropic:
    api-key: ${ANTHROPIC_AUTH_TOKEN:}
    model: ${ANTHROPIC_MODEL:}
    base-url: ${ANTHROPIC_BASE_URL:}
    max-tokens: 4096
  agent:
    max-tool-rounds: 5
  tool:
    bash:
      timeout-seconds: 30
