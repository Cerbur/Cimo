spring:
  application:
    name: Cimo

cimo:
  provider: anthropic
  debug: false
  work-dir: ${user.dir}
  max-tool-rounds: 5
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:}
    base-url: ${ANTHROPIC_BASE_URL:}
    max-tokens: 4096
  tool:
    bash:
      timeout-seconds: 30
